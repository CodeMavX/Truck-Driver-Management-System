# One-click deploy for the Django backend on Render (https://render.com).
# The React frontend deploys separately on Vercel (see frontend/vercel.json).
services:
  - type: web
    name: eld-trip-planner-api
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn eldcore.wsgi --bind 0.0.0.0:$PORT --workers 3"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Set CORS_ALLOWED_ORIGINS to your Vercel URL after the frontend deploys,
      # e.g. https://your-app.vercel.app
